<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Candy Match</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }
    canvas { display: block; border: 2px solid #2a1a4e; border-radius: 10px; cursor: grab; }
    canvas.grabbing { cursor: grabbing; }
    #nameInput { position:fixed; display:none; font-size:18px; padding:8px 12px;
      border-radius:8px; border:2px solid #a855f7; background:#1a0a2e;
      color:#fff; outline:none; text-align:center; z-index:10; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<input id="nameInput" type="text" maxlength="16" placeholder="Enter username...">
<script>
// ── Setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 560, H = 640;
canvas.width = W; canvas.height = H;

// ── Constants ──────────────────────────────────────────────────────
const COLS = 6, ROWS = 6;
const TILE = 82, GAP = 4, CELL = 86;
const BOARD_X = (W - COLS * CELL) / 2;   // 22
const BOARD_Y = 96;

const GRAVITY   = 2200;   // px/s²
const BOUNCE    = 0.30;
const SETTLE    = 55;     // px/s threshold

const SWAP_DUR   = 0.30;  // s
const REMOVE_DUR = 0.38;
const COMBO_DUR  = 1.3;

const BREATHE_AMP  = 0.010;
const BREATHE_FREQ = 0.55;
const DRAG_SCALE   = 1.14;
const DRAG_THRESH  = 10;

const P_COUNT = 9, P_GRAV = 550, P_LIFE = 0.52;
const SCORE_PER_TILE = 10;
const TRANSFORM_DUR = 0.45;

const TYPES = [
  { grad: ['#d8d8e8','#9090a8'], shape: 'circle'  },  // Helmet
  { grad: ['#70d870','#208820'], shape: 'diamond' },  // UFO
  { grad: ['#e8d080','#b89a3a'], shape: 'star'    },  // Saturn
  { grad: ['#60c0ff','#1860c0'], shape: 'rsquare' },  // Comet
  { grad: ['#4a9fd4','#1a4f8a'], shape: 'hex'     },  // Earth
];

// ── State ──────────────────────────────────────────────────────────
const grid = Array.from({length: ROWS}, () => new Array(COLS).fill(null));
let phase     = 'idle';   // idle | animating
let animPhase = '';        // swap | removing | falling
let pendingSwap = null;
let pendingComplete = null;
let combo = 0, score = 0, highScore = 0, highCombo = 0;
let movesLeft = 50, newRecord = false, gameHighCombo = 0;
let menuState = 'main'; // 'main' | 'profiles' | 'newProfile' | 'gameOver' | null
let profiles = {}, currentProfileName = '', menuButtons = [];
let audioCtx = null, audioBuffer = null;

const particles     = [];
const floatingTexts = [];
const beams         = [];

const IMAGE_SRCS = ['helmet.webp.webp','ufo.webp.webp','saturn.webp.webp','comet.webp.webp','earth.webp.webp'];
const IMAGES = IMAGE_SRCS.map(src => { const img=new Image(); img.src=src; return img; });

const drag = {
  active: false, fromRow: 0, fromCol: 0,
  tile: null, neighbor: null,
  startMX: 0, startMY: 0,
  dirLocked: false, dx: 0, dy: 0,
};

// ── Utilities ──────────────────────────────────────────────────────
const eio  = t => t < 0.5 ? 2*t*t : 1 - (-2*t+2)**2/2;
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,mn,mx) => Math.max(mn, Math.min(mx, v));
const rnd  = (mn,mx) => mn + Math.random()*(mx-mn);

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w,y, x+w,y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w,y+h, x+w-r,y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x,y+h, x,y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x,y, x+r,y); c.closePath();
}

function c2p(row, col) { return { x: BOARD_X + col*CELL, y: BOARD_Y + row*CELL }; }
function p2c(px, py) {
  const col = Math.floor((px-BOARD_X)/CELL), row = Math.floor((py-BOARD_Y)/CELL);
  return (col<0||col>=COLS||row<0||row>=ROWS) ? null : {row,col};
}
function cmouse(e) {
  const r = canvas.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(W/r.width), y:(e.clientY-r.top)*(H/r.height) };
}
function* allTiles() {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if (grid[r][c]) yield grid[r][c];
}

// ── Object rendering (image-based) ──────────────────────────────────
function drawObject(c, type, r) {
  if (IMAGES[type] && IMAGES[type].complete && IMAGES[type].naturalWidth>0) {
    c.drawImage(IMAGES[type], -r, -r, r*2, r*2);
  }
}

function shape4star(c, cx, cy, r) {
  c.beginPath();
  for (let i=0;i<8;i++) {
    const a=i*Math.PI/4-Math.PI/4, rad=i%2===0?r:r*.38;
    const x=cx+Math.cos(a)*rad, y=cy+Math.sin(a)*rad;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  }
  c.closePath();
}

// ── Tile factory ───────────────────────────────────────────────────
function makeTile(type, row, col) {
  const p = c2p(row,col);
  return { type, row, col, x:p.x, y:p.y, vy:0, scale:1, alpha:1, isBomb:false, isLaser:false, laserDir:null,
           state:'idle', idleT:Math.random()*Math.PI*2, animT:0, animData:{} };
}

// ── Draw tile ─────────────────────────────────────────────────────
function drawTile(t) {
  if (t.alpha <= 0 || t.scale <= 0) return;
  const S=TILE*t.scale, r=S/2, br=S*.18;
  const cx=t.x+TILE/2, cy=t.y+TILE/2;
  ctx.save();
  ctx.globalAlpha = t.alpha;
  ctx.translate(cx,cy); ctx.scale(t.scale,t.scale);
  // object image
  drawObject(ctx, t.type, r);
  // selection ring
  if (t.state==='selected') {
    ctx.strokeStyle='rgba(255,255,255,.88)'; ctx.lineWidth=3/t.scale;
    ctx.shadowColor='#fff'; ctx.shadowBlur=14/t.scale;
    roundRect(ctx,-r,-r,S,S,br); ctx.stroke(); ctx.shadowBlur=0;
  }
  // bomb: electric energy aura around the object
  if (t.isBomb) {
    const now=Date.now();
    const hue=(now/40)%360;
    const pulse=0.5+0.5*Math.sin(now/600);
    const pr=r*.88;

    ctx.save();
    // pulsing outer ring
    const ringR=pr*(1.14+0.06*pulse);
    ctx.strokeStyle=`hsl(${hue},90%,72%)`;
    ctx.lineWidth=(1.4+1.4*pulse)/t.scale;
    ctx.shadowColor=`hsl(${hue},100%,65%)`;
    ctx.shadowBlur=(8+12*pulse)/t.scale;
    ctx.beginPath(); ctx.arc(0,0,ringR,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
    // electric arcs (6, each flickers independently)
    ctx.lineCap='round';
    const arcCount=6, rot=(now/1800);
    for (let i=0;i<arcCount;i++) {
      if (Math.sin(now/80+i*1.3)<0.15) continue; // flicker — arc off ~40% of time
      const ang=rot+(i/arcCount)*Math.PI*2;
      const ir=pr*1.04, or=pr*(1.28+0.14*Math.sin(now/90+i));
      const midAng=ang+0.22*(Math.sin(now/70+i*2.1)-.5);
      const mr=(ir+or)/2;
      ctx.strokeStyle=`hsl(${(hue+i*18)%360},92%,80%)`;
      ctx.lineWidth=(0.9+0.5*Math.sin(now/110+i))/t.scale;
      ctx.shadowColor=`hsl(${(hue+i*18)%360},100%,72%)`;
      ctx.shadowBlur=(3+5*Math.sin(now/110+i))/t.scale;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang)*ir,Math.sin(ang)*ir);
      ctx.lineTo(Math.cos(midAng)*mr,Math.sin(midAng)*mr);
      ctx.lineTo(Math.cos(ang)*or,Math.sin(ang)*or);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
    ctx.restore();
  }
  // laser icon: two directional chevrons + glowing beam
  if (t.isLaser) {
    const now=Date.now();
    const pulse=0.5+0.5*Math.sin(now/950);
    const hue=185+30*pulse;
    const lcol=`hsl(${hue},100%,60%)`;
    const chev=r*.27;   // chevron arm length
    // per-direction: [pos1x, pos1y, angle1,  pos2x, pos2y, angle2]
    const D={
      h:  [ r*.50,  0,       0,       -r*.50,  0,       Math.PI        ],
      v:  [ 0,      r*.50,   Math.PI/2, 0,    -r*.50,  -Math.PI/2     ],
      d1: [ r*.36,  r*.36,   Math.PI/4, -r*.36,-r*.36, -3*Math.PI/4   ],
      d2: [-r*.36,  r*.36,   3*Math.PI/4, r*.36,-r*.36,-Math.PI/4     ],
    }[t.laserDir];
    ctx.save();
    ctx.shadowColor=lcol; ctx.shadowBlur=(5+8*pulse)/t.scale;
    ctx.strokeStyle=lcol; ctx.lineWidth=2.0/t.scale; ctx.lineCap='round'; ctx.lineJoin='round';
    // central beam
    ctx.beginPath(); ctx.moveTo(D[0],D[1]); ctx.lineTo(D[3],D[4]); ctx.stroke();
    // two chevrons
    for (let i=0;i<2;i++) {
      const px=D[i*3], py=D[i*3+1], ang=D[i*3+2];
      ctx.save(); ctx.translate(px,py); ctx.rotate(ang);
      ctx.beginPath(); ctx.moveTo(-chev,-chev*.65); ctx.lineTo(0,0); ctx.lineTo(-chev,chev*.65); ctx.stroke();
      ctx.restore();
    }
    ctx.shadowBlur=0; ctx.restore();
  }
  ctx.restore();
}

// ── Match detection ────────────────────────────────────────────────
function findMatches() {
  const set = new Set();
  function scan(cells) {
    let rtype=-1, rs=0, rl=0;
    for (let i=0;i<=cells.length;i++) {
      const t = i<cells.length ? cells[i] : null;
      if (t && t.type===rtype) { rl++; }
      else {
        if (rl>=3) for (let j=rs;j<rs+rl;j++) { const c=cells[j]; set.add(`${c.row},${c.col}`); }
        if (t) { rtype=t.type; rs=i; rl=1; } else { rtype=-1; rs=i+1; rl=0; }
      }
    }
  }
  for (let r=0;r<ROWS;r++) scan(grid[r]);
  for (let c=0;c<COLS;c++) { const col=[]; for (let r=0;r<ROWS;r++) col.push(grid[r][c]); scan(col); }
  // ↘ diagonals
  for (let sc=0;sc<COLS;sc++) { const d=[]; for (let i=0;i+sc<COLS&&i<ROWS;i++) d.push(grid[i][sc+i]); scan(d); }
  for (let sr=1;sr<ROWS;sr++) { const d=[]; for (let i=0;sr+i<ROWS&&i<COLS;i++) d.push(grid[sr+i][i]); scan(d); }
  // ↙ diagonals
  for (let sc=COLS-1;sc>=0;sc--) { const d=[]; for (let i=0;sc-i>=0&&i<ROWS;i++) d.push(grid[i][sc-i]); scan(d); }
  for (let sr=1;sr<ROWS;sr++) { const d=[]; for (let i=0;sr+i<ROWS&&COLS-1-i>=0;i++) d.push(grid[sr+i][COLS-1-i]); scan(d); }
  return Array.from(set).map(k=>{ const [r,c]=k.split(',').map(Number); return {row:r,col:c}; });
}

function findRuns() {
  const runs=[];
  function scan(cells,dir) {
    let rtype=-1,rs=0,rl=0;
    for (let i=0;i<=cells.length;i++) {
      const t=i<cells.length?cells[i]:null;
      if (t&&t.type===rtype) { rl++; }
      else {
        if (rl>=3) runs.push({cells:cells.slice(rs,rs+rl),dir});
        if (t) { rtype=t.type; rs=i; rl=1; } else { rtype=-1; rs=i+1; rl=0; }
      }
    }
  }
  for (let r=0;r<ROWS;r++) scan(grid[r],'h');
  for (let c=0;c<COLS;c++) { const col=[]; for (let r=0;r<ROWS;r++) col.push(grid[r][c]); scan(col,'v'); }
  for (let sc=0;sc<COLS;sc++) { const d=[]; for (let i=0;i+sc<COLS&&i<ROWS;i++) d.push(grid[i][sc+i]); scan(d,'d1'); }
  for (let sr=1;sr<ROWS;sr++) { const d=[]; for (let i=0;sr+i<ROWS&&i<COLS;i++) d.push(grid[sr+i][i]); scan(d,'d1'); }
  for (let sc=COLS-1;sc>=0;sc--) { const d=[]; for (let i=0;sc-i>=0&&i<ROWS;i++) d.push(grid[i][sc-i]); scan(d,'d2'); }
  for (let sr=1;sr<ROWS;sr++) { const d=[]; for (let i=0;sr+i<ROWS&&COLS-1-i>=0;i++) d.push(grid[sr+i][COLS-1-i]); scan(d,'d2'); }
  return runs;
}

function getLaserCells(row, col, dir) {
  const out=[];
  if (dir==='h') { for (let c=0;c<COLS;c++) out.push({row,col:c}); }
  else if (dir==='v') { for (let r=0;r<ROWS;r++) out.push({row:r,col}); }
  else if (dir==='d1') {
    let r=row,c=col; while(r>0&&c>0){r--;c--;} while(r<ROWS&&c<COLS){out.push({row:r,col:c});r++;c++;}
  } else {
    let r=row,c=col; while(r>0&&c<COLS-1){r--;c++;} while(r<ROWS&&c>=0){out.push({row:r,col:c});r++;c--;}
  }
  return out;
}

// ── 2×2 detection & bomb helpers ──────────────────────────────────
function find2x2() {
  const squares=[], used=new Set();
  for (let r=0;r<ROWS-1;r++) for (let c=0;c<COLS-1;c++) {
    const t00=grid[r][c],t01=grid[r][c+1],t10=grid[r+1][c],t11=grid[r+1][c+1];
    if (!t00||!t01||!t10||!t11) continue;
    if (t00.type!==t01.type||t00.type!==t10.type||t00.type!==t11.type) continue;
    const keys=[`${r},${c}`,`${r},${c+1}`,`${r+1},${c}`,`${r+1},${c+1}`];
    if (keys.some(k=>used.has(k))) continue;
    keys.forEach(k=>used.add(k));
    squares.push({r,c});
  }
  return squares;
}

function getBombCells(row, col) {
  const out=[];
  for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++) {
    const r=row+dr,c=col+dc;
    if (r>=0&&r<ROWS&&c>=0&&c<COLS) out.push({row:r,col:c});
  }
  for (const [dr,dc] of [[-2,0],[2,0],[0,-2],[0,2]]) {
    const r=row+dr,c=col+dc;
    if (r>=0&&r<ROWS&&c>=0&&c<COLS) out.push({row:r,col:c});
  }
  return out;
}

function getBombBombCells(r1, c1, r2, c2) {
  const p1=c2p(r1,c1), p2=c2p(r2,c2);
  const cx=(p1.x+p2.x)/2+TILE/2, cy=(p1.y+p2.y)/2+TILE/2;
  const all=[];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const p=c2p(r,c), tx=p.x+TILE/2, ty=p.y+TILE/2;
    all.push({row:r,col:c,dist:Math.hypot(tx-cx,ty-cy)});
  }
  all.sort((a,b)=>a.dist-b.dist);
  return all.slice(0,Math.floor(ROWS*COLS/2));
}

function getBombLaserCells(row, col) {
  const out=[];
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) out.push({row:r,col:c});
  return out;
}

function getDualLaserCells(row, col) {
  const keys=new Set();
  for (let dr=-1;dr<=1;dr++) { const r=row+dr; if(r>=0&&r<ROWS) for(let c=0;c<COLS;c++) keys.add(`${r},${c}`); }
  for (let dc=-1;dc<=1;dc++) { const c=col+dc; if(c>=0&&c<COLS) for(let r=0;r<ROWS;r++) keys.add(`${r},${c}`); }
  return [...keys].map(k=>{const[r,c]=k.split(',').map(Number);return{row:r,col:c};});
}

function emitDualLaserBeams(row, col, type) {
  for (let dr=-1;dr<=1;dr++) { const r=row+dr; if(r>=0&&r<ROWS) emitLaserBeam({row:r,col:0,laserDir:'h',type}); }
  for (let dc=-1;dc<=1;dc++) { const c=col+dc; if(c>=0&&c<COLS) emitLaserBeam({row:0,col:c,laserDir:'v',type}); }
}

function expandChains(removeKeys, preActivated=new Set()) {
  const activated=new Set(preActivated);
  let changed=true;
  while (changed) {
    changed=false;
    for (const key of [...removeKeys]) {
      if (activated.has(key)) continue;
      const [r,c]=key.split(',').map(Number);
      const t=grid[r]&&grid[r][c]; if (!t) continue;
      if (t.isBomb||t.isLaser) {
        activated.add(key);
        const blast=t.isBomb?getBombCells(r,c):getLaserCells(r,c,t.laserDir);
        for (const {row,col} of blast) {
          const bk=`${row},${col}`;
          if (!removeKeys.has(bk)) { removeKeys.add(bk); changed=true; }
        }
      }
    }
  }
}

function checkBoard() {
  const transformKeys=new Set();       // bomb transforms: key
  const laserMap=new Map();            // laser transforms: key → dir
  const removeKeys=new Set();

  // Phase 1: 2×2 squares
  for (const {r,c} of find2x2()) {
    const cells2x2=[{row:r,col:c},{row:r,col:c+1},{row:r+1,col:c},{row:r+1,col:c+1}];
    const anySpecial=cells2x2.some(({row,col})=>{ const t=grid[row]&&grid[row][col]; return t&&(t.isBomb||t.isLaser); });
    if (anySpecial) {
      for (const {row,col} of cells2x2) {
        const t=grid[row]&&grid[row][col]; if (!t) continue;
        if (t.isBomb) { for (const {row:br,col:bc} of getBombCells(row,col)) removeKeys.add(`${br},${bc}`); }
        else if (t.isLaser) { for (const {row:lr,col:lc} of getLaserCells(row,col,t.laserDir)) removeKeys.add(`${lr},${lc}`); }
        else removeKeys.add(`${row},${col}`);
      }
    } else {
      transformKeys.add(`${r},${c}`);
      removeKeys.add(`${r+1},${c}`); removeKeys.add(`${r},${c+1}`); removeKeys.add(`${r+1},${c+1}`);
    }
  }

  // Phase 2 & 3: runs — process 4+ first (laser priority), then 3-runs
  const allRuns=findRuns();
  const runs4=allRuns.filter(r=>r.cells.length>=4);
  const runs3=allRuns.filter(r=>r.cells.length<4);
  for (const {cells,dir} of [...runs4,...runs3]) {
    const is4plus=cells.length>=4;
    const free=cells.filter(({row,col})=>{
      const k=`${row},${col}`;
      return !transformKeys.has(k)&&!laserMap.has(k)&&!removeKeys.has(k);
    });
    if (!free.length) continue;
    // check for special tiles in the free set
    const specIdx=free.findIndex(({row,col})=>{ const t=grid[row][col]; return t&&(t.isBomb||t.isLaser); });
    if (specIdx>=0) {
      const {row,col}=free[specIdx]; const t=grid[row][col];
      if (t.isBomb) { for (const {row:br,col:bc} of getBombCells(row,col)) removeKeys.add(`${br},${bc}`); }
      else if (t.isLaser) { for (const {row:lr,col:lc} of getLaserCells(row,col,t.laserDir)) removeKeys.add(`${lr},${lc}`); }
      for (let i=0;i<free.length;i++) { if (i!==specIdx) removeKeys.add(`${free[i].row},${free[i].col}`); }
    } else if (is4plus && free.length>=4) {
      const mid=Math.floor((free.length-1)/2);
      laserMap.set(`${free[mid].row},${free[mid].col}`,dir);
      for (let i=0;i<free.length;i++) { if (i!==mid) removeKeys.add(`${free[i].row},${free[i].col}`); }
    } else {
      for (const {row,col} of free) removeKeys.add(`${row},${col}`);
    }
  }

  // Phase 3b: chain reactions
  expandChains(removeKeys);

  // Phase 4: blasts override transforms
  for (const key of removeKeys) { transformKeys.delete(key); laserMap.delete(key); }

  // Phase 5: build output
  const toRemove=[], toTransform=[];
  for (const key of removeKeys) { const [r,c]=key.split(',').map(Number); if (grid[r]&&grid[r][c]) toRemove.push({row:r,col:c}); }
  for (const key of transformKeys) { const [r,c]=key.split(',').map(Number); toTransform.push({row:r,col:c}); }
  for (const [key,dir] of laserMap) { const [r,c]=key.split(',').map(Number); toTransform.push({row:r,col:c,laserDir:dir}); }
  return {toRemove,toTransform};
}

// ── Grid init ─────────────────────────────────────────────────────
function initGrid() {
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) grid[r][c]=makeTile(Math.floor(Math.random()*TYPES.length),r,c);
  for (let iter=0;iter<80;iter++) {
    const m=findMatches(); if (!m.length) break;
    for (const {row,col} of m) grid[row][col].type=Math.floor(Math.random()*TYPES.length);
  }
}

// ── Particles ─────────────────────────────────────────────────────
function emit(t) {
  const cx=t.x+TILE/2, cy=t.y+TILE/2, col=TYPES[t.type].grad[0];
  for (let i=0;i<P_COUNT;i++) {
    const a=Math.random()*Math.PI*2, spd=rnd(110,270);
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,col,sz:rnd(4,8),alpha:1,life:0});
  }
}
function emitBombExplosion(t) {
  const col=TYPES[t.type].grad[0];
  for (const {row,col:c} of getBombCells(t.row,t.col)) {
    const p=c2p(row,c);

function emitBombBombCombo(cx, cy) {
  const cols=['#ffffff','#ffaa33','#ff6b6b','#ffee55','#ff55cc'];
  for (let i=0;i<60;i++) {
    const a=Math.random()*Math.PI*2, spd=rnd(150,750);
    particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      col:cols[i%cols.length], sz:rnd(5,15), alpha:1, life:0});
  }
}

function emitBombLaserCombo(row, col, type) {
  const pcol=TYPES[type].grad[0];
  for (const {row:r,col:c} of getBombLaserCells(row,col)) {
    const p=c2p(r,c);
    beams.push({shape:'cell', x1:p.x+TILE/2, y1:p.y+TILE/2, col:pcol, life:0, dur:0.48});
  }
}

function emitLaserBeam(t) {
  const cells=getLaserCells(t.row,t.col,t.laserDir);
  if (!cells.length) return;
  const p1=c2p(cells[0].row,cells[0].col), p2=c2p(cells[cells.length-1].row,cells[cells.length-1].col);
  beams.push({
    x1:p1.x+TILE/2, y1:p1.y+TILE/2, x2:p2.x+TILE/2, y2:p2.y+TILE/2,
    col:TYPES[t.type].grad[0], life:0, dur:0.52
  });
}
function emitLaserActivation(t) {
  const cx=t.x+TILE/2, cy=t.y+TILE/2, col=TYPES[t.type].grad[0];
  const axAngle=t.laserDir==='h'?0:t.laserDir==='v'?Math.PI/2:t.laserDir==='d1'?Math.PI/4:-Math.PI/4;
  for (let i=0;i<18;i++) {
    const spread=(Math.random()-.5)*Math.PI*.55;
    const a=axAngle+spread+(i%2===0?0:Math.PI);

  }
}

function initAudio() {
  if (!audioCtx) {
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    fetch(DESTROY_SND).then(r=>r.arrayBuffer())
      .then(buf=>audioCtx.decodeAudioData(buf))
      .then(decoded=>{audioBuffer=decoded;});
  }
  if (audioCtx.state==='suspended') audioCtx.resume();
}
function playDestroySound(count) {
  initAudio(); if (!audioCtx||!audioBuffer||audioCtx.state!=='running') return;
  const vol=Math.min(1.0, 0.35+Math.sqrt(count)*0.12);
  const src=audioCtx.createBufferSource(); src.buffer=audioBuffer;
  const gain=audioCtx.createGain(); gain.gain.setValueAtTime(vol,audioCtx.currentTime);
  src.connect(gain); gain.connect(audioCtx.destination); src.start();
}

function updateBeams(dt) {
  for (let i=beams.length-1;i>=0;i--) {
    const b=beams[i]; b.life+=dt;
    if (b.life>=b.dur) beams.splice(i,1);
  }
}
function drawBeams() {
  for (const b of beams) {
    const t=b.life/b.dur;
    const a=t<0.10 ? t/0.10 : 1-(t-0.10)/0.90;
    if (a<=0) continue;
    ctx.save();
    if (b.shape==='cell') {
      // bomb blast: glowing cell highlight
      const hs=TILE*0.88, hr=hs*0.18;
      // wide colored glow
      ctx.globalAlpha=a*0.42; ctx.fillStyle=b.col; ctx.shadowColor=b.col; ctx.shadowBlur=28;
      roundRect(ctx,b.x1-hs/2,b.y1-hs/2,hs,hs,hr); ctx.fill();
      // mid white haze
      const ms=TILE*0.54;
      ctx.globalAlpha=a*0.65; ctx.fillStyle='#ffffff'; ctx.shadowColor='#ffffff'; ctx.shadowBlur=18;
      roundRect(ctx,b.x1-ms/2,b.y1-ms/2,ms,ms,ms*0.18); ctx.fill();
      // bright white core
      const cs=TILE*0.18;
      ctx.globalAlpha=a; ctx.fillStyle='#ffffff'; ctx.shadowBlur=8;
      roundRect(ctx,b.x1-cs/2,b.y1-cs/2,cs,cs,cs*0.3); ctx.fill();
    } else {
      // laser beam: directional line
      ctx.lineCap='round';
      ctx.globalAlpha=a*0.40; ctx.strokeStyle=b.col;
      ctx.lineWidth=TILE*0.85; ctx.shadowColor=b.col; ctx.shadowBlur=28;
      ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2); ctx.stroke();
      ctx.globalAlpha=a*0.65; ctx.strokeStyle='#ffffff';
      ctx.lineWidth=TILE*0.42; ctx.shadowColor='#ffffff'; ctx.shadowBlur=18;
      ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2); ctx.stroke();
      ctx.globalAlpha=a; ctx.strokeStyle='#ffffff';
      ctx.lineWidth=TILE*0.10; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2); ctx.stroke();
    }
    ctx.shadowBlur=0; ctx.restore();
  }
}
function updateParticles(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.life+=dt; p.vy+=P_GRAV*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.alpha=1-p.life/P_LIFE;
    if (p.life>=P_LIFE) particles.splice(i,1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha=Math.max(0,p.alpha); ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz/2,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── Floating text ─────────────────────────────────────────────────
function spawnCombo(n) {
  floatingTexts.push({text:`×${n} COMBO!`, x:W/2, y:BOARD_Y+ROWS*CELL/2, alpha:1, vy:-85});
}
function updateFT(dt) {
  for (let i=floatingTexts.length-1;i>=0;i--) {
    const f=floatingTexts[i]; f.y+=f.vy*dt; f.alpha-=dt/COMBO_DUR; if (f.alpha<=0) floatingTexts.splice(i,1);
  }
}
function drawFT() {
  for (const f of floatingTexts) {
    ctx.save(); ctx.globalAlpha=Math.max(0,f.alpha);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 30px "Segoe UI",sans-serif';
    ctx.shadowColor='rgba(255,220,50,.9)'; ctx.shadowBlur=16;
    ctx.fillStyle='#ffe066'; ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  }
}

// ── Swap ──────────────────────────────────────────────────────────
function initiateSwap(r1,c1,r2,c2) {
  phase='animating'; animPhase='swap';
  pendingSwap={r1,c1,r2,c2,back:false};
  const p1=c2p(r1,c1), p2=c2p(r2,c2);
  const t1=grid[r1][c1], t2=grid[r2][c2];
  function startAnim(t,tx,ty,dur) { t.state='swapping'; t.animT=0; t.animData={sx:t.x,sy:t.y,tx,ty,dur}; }
  startAnim(t1,p2.x,p2.y,SWAP_DUR); startAnim(t2,p1.x,p1.y,SWAP_DUR);
  grid[r1][c1]=t2; t2.row=r1; t2.col=c1;
  grid[r2][c2]=t1; t1.row=r2; t1.col=c2;
}

function updateSwap(dt) {
  let any=false, still=false;
  for (const t of allTiles()) {
    if (t.state!=='swapping') continue;
    any=true;
    t.animT+=dt/t.animData.dur;
    if (t.animT>=1) { t.animT=1; t.x=t.animData.tx; t.y=t.animData.ty; t.state='idle'; }
    else { const e=eio(t.animT); t.x=lerp(t.animData.sx,t.animData.tx,e); t.y=lerp(t.animData.sy,t.animData.ty,e); }
  }
  for (const t of allTiles()) if (t.state==='swapping') { still=true; break; }
  if (any && !still) pendingComplete='swap';
}

function onSwapDone() {
  const {r1,c1,r2,c2,back} = pendingSwap;
  if (back) { phase='idle'; animPhase=''; return; }

  // Special: swapping two lasers → both fire immediately (no match required)
  const tA=grid[r1][c1], tB=grid[r2][c2];
  // Special: two bombs → radial half-board wipe
  if (tA&&tB&&tA.isBomb&&tB.isBomb) {
    movesLeft--;
    const p1=c2p(r1,c1), p2=c2p(r2,c2);
    const cx=(p1.x+p2.x)/2+TILE/2, cy=(p1.y+p2.y)/2+TILE/2;
    emitBombBombCombo(cx,cy);
    const cells=getBombBombCells(r1,c1,r2,c2);
    const rk=new Set(cells.map(({row,col})=>`${row},${col}`));
    expandChains(rk, new Set([`${r1},${c1}`,`${r2},${c2}`]));
    const toRemove=[];
    for (const k of rk) { const[r,c]=k.split(',').map(Number); if(grid[r]&&grid[r][c]) toRemove.push({row:r,col:c}); }
    combo++; applyScore(toRemove.length); if(combo>=2) spawnCombo(combo);
    startRemove(toRemove,[]);
    return;
  }
  // Special: bomb + laser → full board wipe
  if (tA&&tB&&((tA.isBomb&&tB.isLaser)||(tA.isLaser&&tB.isBomb))) {
    movesLeft--;
    const [br,bc,btype]=tA.isBomb?[r1,c1,tA.type]:[r2,c2,tB.type];
    emitBombLaserCombo(br,bc,btype);
    const cells=getBombLaserCells(br,bc);
    const rk=new Set(cells.map(({row,col})=>`${row},${col}`));
    expandChains(rk);
    const toRemove=[];
    for (const k of rk) { const[r,c]=k.split(',').map(Number); if(grid[r]&&grid[r][c]) toRemove.push({row:r,col:c}); }
    combo++; applyScore(toRemove.length); if(combo>=2) spawnCombo(combo);
    startRemove(toRemove,[]);
    return;
  }
  if (tA&&tB&&tA.isLaser&&tB.isLaser) {
    movesLeft--;
    // H+V cross, each 3 lines wide, centered on first tile
    emitDualLaserBeams(r1,c1,tA.type);
    const cells=getDualLaserCells(r1,c1);
    const rk=new Set(cells.map(({row,col})=>`${row},${col}`));
    // Pre-activate the two laser tiles so expandChains doesn't re-fire their stored (possibly diagonal) directions
    expandChains(rk, new Set([`${r1},${c1}`,`${r2},${c2}`]));
    const toRemove=[];
    for (const k of rk) { const[r,c]=k.split(',').map(Number); if(grid[r]&&grid[r][c]) toRemove.push({row:r,col:c}); }
    combo++; applyScore(toRemove.length); if(combo>=2) spawnCombo(combo);
    startRemove(toRemove,[]);
    return;
  }

  const {toRemove,toTransform}=checkBoard();
  if (!toRemove.length && !toTransform.length) {
    // swap back
    pendingSwap.back=true;
    const p1=c2p(r1,c1), p2=c2p(r2,c2);
    const ta=grid[r2][c2], tb=grid[r1][c1];
    grid[r1][c1]=ta; ta.row=r1; ta.col=c1;
    grid[r2][c2]=tb; tb.row=r2; tb.col=c2;
    function sa(t,tx,ty) { t.state='swapping'; t.animT=0; t.animData={sx:t.x,sy:t.y,tx,ty,dur:SWAP_DUR*.65}; }
    sa(ta,p1.x,p1.y); sa(tb,p2.x,p2.y);
    return;
  }
  movesLeft--;
  combo++; applyScore(toRemove.length + toTransform.length*5); if (combo>=2) spawnCombo(combo);
  startRemove(toRemove, toTransform);
}

// ── Remove ────────────────────────────────────────────────────────
function startRemove(toRemove, toTransform=[]) {
  if (toRemove.length) playDestroySound(toRemove.length);
  animPhase='removing';
  for (const {row,col} of toRemove) {
    const t=grid[row][col]; if (!t||t.state==='removing') continue;
    if (t.isLaser) { emitLaserActivation(t); emitLaserBeam(t); }
    else if (t.isBomb) emitBombExplosion(t);
    else emit(t);
    t.state='removing'; t.animT=0;
  }
  for (const {row,col,laserDir} of toTransform) {
    const t=grid[row][col]; if (!t) continue;
    if (laserDir) { t.isLaser=true; t.laserDir=laserDir; }
    else { t.isBomb=true; }
    t.state='transforming'; t.animT=0;
  }
}

function updateRemove(dt) {
  let any=false, still=false;
  for (const t of allTiles()) {
    if (t.state==='removing') {
      any=true; t.animT+=dt/REMOVE_DUR;
      if (t.animT>=1) { t.alpha=0; t.scale=0; grid[t.row][t.col]=null; t.state='removed'; }
      else if (t.animT<0.4) { t.scale=1+0.25*(t.animT/0.4); }
      else { const p=(t.animT-.4)/.6; t.scale=1.25*(1-p); t.alpha=1-p; }
    } else if (t.state==='transforming') {
      any=true; t.animT+=dt/TRANSFORM_DUR;
      if (t.animT>=1) { t.scale=1; t.state='idle'; }
      else if (t.animT<0.5) { t.scale=lerp(1,1.4,t.animT/0.5); }
      else { t.scale=lerp(1.4,1,(t.animT-0.5)/0.5); }
    }
  }
  for (const t of allTiles()) if (t.state==='removing'||t.state==='transforming') { still=true; break; }
  if (any && !still) pendingComplete='remove';
}

// ── Spawn & Fall ──────────────────────────────────────────────────
function spawnAndFall() {
  animPhase='falling';
  for (let c=0;c<COLS;c++) {
    const survivors=[];
    for (let r=ROWS-1;r>=0;r--) { if (grid[r][c]) { survivors.push(grid[r][c]); grid[r][c]=null; } }
    let tr=ROWS-1;
    for (const t of survivors) {
      t.row=tr; t.col=c; grid[tr][c]=t;
      const ty=c2p(tr,c).y;
      if (t.y < ty) { t.state='falling'; t.vy=0; }
      else { t.state='idle'; t.y=ty; }
      t.x=c2p(tr,c).x; tr--;
    }
    const newCount=ROWS-survivors.length;
    for (let i=0;i<newCount;i++) {
      const row=i, t=makeTile(Math.floor(Math.random()*TYPES.length),row,c);
      t.y=BOARD_Y-(newCount-i)*CELL; t.vy=0; t.state='falling';
      grid[row][c]=t;
    }
  }
}

function updateFalling(dt) {
  let any=false, still=false;
  for (const t of allTiles()) {
    if (t.state!=='falling') continue;
    any=true; t.vy+=GRAVITY*dt; t.y+=t.vy*dt;
    const ty=c2p(t.row,t.col).y;
    if (t.y>=ty) {
      t.y=ty; t.vy=-t.vy*BOUNCE;
      if (Math.abs(t.vy)<SETTLE) { t.vy=0; t.y=ty; t.state='idle'; }
    }
  }
  for (const t of allTiles()) if (t.state==='falling') { still=true; break; }
  if (any && !still) pendingComplete='fall';
}

function onFallDone() {
  const {toRemove,toTransform}=checkBoard();
  if (toRemove.length||toTransform.length) {
    combo++; applyScore(toRemove.length + toTransform.length*5); if (combo>=2) spawnCombo(combo);
    startRemove(toRemove, toTransform);
  } else {
    combo=0; phase='idle'; animPhase='';
    if (movesLeft<=0) {
      newRecord = score>(profiles[currentProfileName]?.highScore||0);
      saveCurrentProfile();
      setTimeout(()=>{ menuState='gameOver'; },500);
    }
  }
}

function applyScore(n) { score+=n*SCORE_PER_TILE*combo; highScore=Math.max(score,highScore); highCombo=Math.max(combo,highCombo); gameHighCombo=Math.max(combo,gameHighCombo); }

// ── Profiles ──────────────────────────────────────────────────────
function loadProfiles() {
  try { profiles=JSON.parse(localStorage.getItem('candyProfiles')||'{}'); } catch(e) { profiles={}; }
  currentProfileName=localStorage.getItem('candyCurrentProfile')||'';
}
function saveProfiles() {
  localStorage.setItem('candyProfiles',JSON.stringify(profiles));
  localStorage.setItem('candyCurrentProfile',currentProfileName);
}
function saveCurrentProfile() {
  if (!currentProfileName) return;
  profiles[currentProfileName]={highScore,highCombo};
  saveProfiles();
}
function showNameInput() {
  const ni=document.getElementById('nameInput');
  const r=canvas.getBoundingClientRect(), s=r.width/W;
  ni.style.left=(r.left+(W/2-150)*s)+'px';
  ni.style.top=(r.top+244*s)+'px';
  ni.style.width=(300*s)+'px';
  ni.style.display='block'; ni.value=''; ni.focus();
}
function hideNameInput() {
  const ni=document.getElementById('nameInput');
  ni.style.display='none'; ni.blur();
}
function startGame() {
  const p=profiles[currentProfileName]||{highScore:0,highCombo:0};
  score=0; combo=0; movesLeft=100; newRecord=false; gameHighCombo=0; highScore=p.highScore; highCombo=p.highCombo;
  particles.length=0; floatingTexts.length=0; beams.length=0;
  initGrid(); menuState=null; hideNameInput();
}
function returnToMenu() {
  saveCurrentProfile();
  phase='idle'; animPhase=''; pendingSwap=null; pendingComplete=null;
  particles.length=0; floatingTexts.length=0; beams.length=0;
  menuState='main';
}
function createProfile(name) {
  name=name.trim(); if (!name) return;
  if (!profiles[name]) profiles[name]={highScore:0,highCombo:0};
  currentProfileName=name; saveProfiles();
  menuState='main'; hideNameInput();
}
function handleMenuClick(m) {
  for (const b of menuButtons)
    if (m.x>=b.x&&m.x<=b.x+b.w&&m.y>=b.y&&m.y<=b.y+b.h) { b.action(); return true; }
  return false;
}

// ── Update ────────────────────────────────────────────────────────
function update(dt, now) {
  updateParticles(dt); updateFT(dt); updateBeams(dt);
  pendingComplete=null;

  if (phase==='idle') {
    for (const t of allTiles()) {
      if (drag.active && t===drag.tile) continue;
      t.scale=1+BREATHE_AMP*Math.sin(now/1000*BREATHE_FREQ*Math.PI*2+t.idleT);
    }
    return;
  }

  if (animPhase==='swap')     updateSwap(dt);
  if (animPhase==='removing') updateRemove(dt);
  if (animPhase==='falling')  updateFalling(dt);

  if (pendingComplete==='swap')   onSwapDone();
  if (pendingComplete==='remove') spawnAndFall();
  if (pendingComplete==='fall')   onFallDone();
}

// ── Render ────────────────────────────────────────────────────────
function render(now) {
  menuButtons=[];
  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0d0d1a'); bg.addColorStop(1,'#1a0d2e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // dot pattern
  ctx.fillStyle='rgba(100,80,160,.07)';
  for (let x=22;x<W;x+=28) for (let y=22;y<H;y+=28) { ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill(); }

  // Board border
  ctx.save();
  ctx.shadowColor='rgba(150,70,255,.3)'; ctx.shadowBlur=22;
  ctx.strokeStyle='rgba(150,70,255,.4)'; ctx.lineWidth=2;
  roundRect(ctx,BOARD_X-5,BOARD_Y-5,COLS*CELL+10,ROWS*CELL+10,12); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(18,8,38,.6)';
  roundRect(ctx,BOARD_X-5,BOARD_Y-5,COLS*CELL+10,ROWS*CELL+10,12); ctx.fill();
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,.09)'; ctx.lineWidth=1;
  for (let gc=1;gc<COLS;gc++) { ctx.beginPath(); ctx.moveTo(BOARD_X+gc*CELL,BOARD_Y); ctx.lineTo(BOARD_X+gc*CELL,BOARD_Y+ROWS*CELL); ctx.stroke(); }
  for (let gr=1;gr<ROWS;gr++) { ctx.beginPath(); ctx.moveTo(BOARD_X,BOARD_Y+gr*CELL); ctx.lineTo(BOARD_X+COLS*CELL,BOARD_Y+gr*CELL); ctx.stroke(); }
  ctx.restore();

  // Clip to board+above so falling spawns are visible, but not over score panels
  ctx.save();
  ctx.beginPath(); ctx.rect(BOARD_X-5, 0, COLS*CELL+10, H); ctx.clip();

  // Grid tiles
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) {
    const t=grid[r][c];
    if (t && !(drag.active && t===drag.tile) && t.state!=='removed') drawTile(t);
  }

  // Drag tile on top
  if (drag.active && drag.tile) drawTile(drag.tile);
  ctx.restore();

  drawBeams();
  drawParticles();
  drawFT();
  drawHUD();
  drawMenu();
}

function drawHUD() {
  // Title
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font='bold 22px "Segoe UI",sans-serif';
  ctx.fillStyle='rgba(180,100,255,.88)'; ctx.shadowColor='rgba(180,100,255,.5)'; ctx.shadowBlur=10;
  ctx.fillText('CANDY MATCH', W/2, 36); ctx.shadowBlur=0;

  // Score (with current game best combo above value)
  ctx.fillStyle='rgba(0,0,0,.45)'; roundRect(ctx,14,44,150,50,8); ctx.fill();
  ctx.textAlign='left';
  ctx.fillStyle='#999'; ctx.font='11px "Segoe UI",sans-serif'; ctx.fillText('SCORE',26,59);
  if (gameHighCombo>0) {
    ctx.fillStyle='#c084fc'; ctx.font='11px "Segoe UI",sans-serif';
    ctx.fillText('best x'+gameHighCombo,26,72);
  }
  ctx.fillStyle='#fff'; ctx.font='bold 20px "Segoe UI",sans-serif'; ctx.fillText(score.toLocaleString(),26,88);

  // Moves remaining (center)
  ctx.fillStyle='rgba(0,0,0,.45)'; roundRect(ctx,W/2-70,44,140,50,8); ctx.fill();
  ctx.textAlign='center';
  ctx.fillStyle='#999'; ctx.font='11px "Segoe UI",sans-serif'; ctx.fillText('MOVES',W/2,59);
  const mc=movesLeft<=10?'#ff6b6b':movesLeft<=20?'#ffd966':'#fff';
  ctx.fillStyle=mc; ctx.font='bold 22px "Segoe UI",sans-serif'; ctx.fillText(movesLeft,W/2,84);

  // Best score (with all-time best combo above value)
  ctx.fillStyle='rgba(0,0,0,.45)'; roundRect(ctx,W-164,44,150,50,8); ctx.fill();
  ctx.textAlign='right';
  ctx.fillStyle='#999'; ctx.font='11px "Segoe UI",sans-serif'; ctx.fillText('BEST',W-26,59);
  if (highCombo>0) {
    ctx.fillStyle='#c084fc'; ctx.font='11px "Segoe UI",sans-serif';
    ctx.fillText('best x'+highCombo,W-26,72);
  }
  ctx.fillStyle='#ffd966'; ctx.font='bold 20px "Segoe UI",sans-serif'; ctx.fillText(highScore.toLocaleString(),W-26,88);

  // MENU button (in-game only, top-left)
  if (menuState===null) {
    ctx.fillStyle='rgba(0,0,0,.45)'; roundRect(ctx,8,6,58,28,6); ctx.fill();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#aaa'; ctx.font='bold 12px "Segoe UI",sans-serif';
    ctx.fillText('MENU',37,21);
    menuButtons.push({x:8,y:6,w:58,h:28,action:returnToMenu});
  }

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function menuBtn(label,bx,by,bw,bh,action,col) {
  ctx.save();
  ctx.fillStyle=col||'#7c3aed'; roundRect(ctx,bx,by,bw,bh,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 15px "Segoe UI",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label,bx+bw/2,by+bh/2);
  menuButtons.push({x:bx,y:by,w:bw,h:bh,action});
  ctx.restore();
}

function drawMenu() {
  if (menuState===null) return;
  ctx.save();

  // Overlay
  ctx.fillStyle='rgba(0,0,0,0.80)'; ctx.fillRect(0,0,W,H);

  // Panel
  const pw=400, ph=340, px=(W-pw)/2, py=(H-ph)/2;
  ctx.fillStyle='#1a0835';
  roundRect(ctx,px,py,pw,ph,16); ctx.fill();
  ctx.shadowColor='#a855f7'; ctx.shadowBlur=18;
  ctx.strokeStyle='#a855f7'; ctx.lineWidth=2;
  roundRect(ctx,px,py,pw,ph,16); ctx.stroke();
  ctx.shadowBlur=0;

  // X close button (only when a game is in progress, not on game over)
  const gameInProgress=menuState!=='gameOver'&&Array.from({length:ROWS},(_,r)=>r).some(r=>grid[r].some(c=>c));
  if (gameInProgress) {
    const xr=px+pw-38, xy=py+8, xsz=26;
    ctx.fillStyle='rgba(255,255,255,0.08)'; roundRect(ctx,xr,xy,xsz,xsz,6); ctx.fill();
    ctx.fillStyle='#aaa'; ctx.font='bold 16px "Segoe UI",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('\u00D7',xr+xsz/2,xy+xsz/2);
    menuButtons.push({x:xr,y:xy,w:xsz,h:xsz,action:()=>{ menuState=null; }});
  }

  ctx.textAlign='center'; ctx.textBaseline='alphabetic';

  if (menuState==='main') {
    ctx.font='bold 26px "Segoe UI",sans-serif';
    ctx.fillStyle='#e0aaff'; ctx.shadowColor='rgba(180,100,255,.7)'; ctx.shadowBlur=14;
    ctx.fillText('CANDY MATCH',W/2,py+50); ctx.shadowBlur=0;

    const p=profiles[currentProfileName]||{highScore:0,highCombo:0};
    ctx.font='17px "Segoe UI",sans-serif'; ctx.fillStyle='#ddd';
    ctx.fillText(currentProfileName,W/2,py+86);
    ctx.font='14px "Segoe UI",sans-serif';
    ctx.fillStyle='#ffd966'; ctx.fillText('Best Score: '+(p.highScore||0).toLocaleString(),W/2,py+116);
    ctx.fillStyle='#ff9ff3'; ctx.fillText('Best Combo: '+(p.highCombo>0?'x'+p.highCombo:'-'),W/2,py+142);

    const hasAny=Object.keys(profiles).length>0;
    if (hasAny) {
      menuBtn('PLAY',px+80,py+168,240,46,startGame,'#7c3aed');
      menuBtn('PROFILES',px+80,py+228,240,40,()=>{menuState='profiles';},'#4a1a8e');
    } else {
      menuBtn('CREATE PROFILE',px+80,py+190,240,46,()=>{menuState='newProfile';showNameInput();},'#7c3aed');
    }
  }

  if (menuState==='profiles') {
    ctx.font='bold 19px "Segoe UI",sans-serif'; ctx.fillStyle='#e0aaff';
    ctx.fillText('SELECT PROFILE',W/2,py+44);

    const names=Object.keys(profiles);
    names.slice(0,5).forEach((name,i)=>{
      const isCur=name===currentProfileName;
      const by=py+62+i*48;
      const p=profiles[name];
      ctx.save();
      ctx.fillStyle=isCur?'rgba(124,58,237,0.45)':'rgba(255,255,255,0.08)';
      roundRect(ctx,px+20,by,pw-40,40,8); ctx.fill();
      if (isCur) { ctx.shadowColor='#a855f7'; ctx.shadowBlur=8; ctx.strokeStyle='#a855f7'; ctx.lineWidth=1.5; roundRect(ctx,px+20,by,pw-40,40,8); ctx.stroke(); ctx.shadowBlur=0; }
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillStyle=isCur?'#e0aaff':'#ddd'; ctx.font=(isCur?'bold ':'')+'14px "Segoe UI",sans-serif';
      ctx.fillText((isCur?'\u2713  ':'')+name,px+36,by+20);
      ctx.textAlign='right'; ctx.fillStyle='#aaa'; ctx.font='12px "Segoe UI",sans-serif';
      ctx.fillText((p.highScore||0).toLocaleString()+'  x'+(p.highCombo||0),px+pw-30,by+20);
      ctx.restore();
      menuButtons.push({x:px+20,y:by,w:pw-40,h:40,action:()=>{currentProfileName=name;saveProfiles();menuState='main';}});
    });

    const by2=py+ph-90;
    menuBtn('+ NEW PROFILE',px+80,by2,240,38,()=>{menuState='newProfile';showNameInput();},'#4a1a8e');
    menuBtn('BACK',px+80,by2+48,240,34,()=>{menuState='main';},'#2a0a5e');
  }

  if (menuState==='newProfile') {
    ctx.font='bold 22px "Segoe UI",sans-serif'; ctx.fillStyle='#e0aaff';
    ctx.fillText('NEW PROFILE',W/2,py+50);
    ctx.font='14px "Segoe UI",sans-serif'; ctx.fillStyle='#bbb';
    ctx.fillText('Enter a username below',W/2,py+76);

    // Input box outline (HTML <input> floats here)
    ctx.strokeStyle='#a855f7'; ctx.lineWidth=2;
    roundRect(ctx,px+50,py+90,pw-100,44,8); ctx.stroke();

    menuBtn('CREATE',px+80,py+158,240,48,()=>{createProfile(document.getElementById('nameInput').value);},'#7c3aed');
    const hasAny=Object.keys(profiles).length>0;
    menuBtn('BACK',px+80,py+220,240,36,()=>{menuState=hasAny?'profiles':'main';hideNameInput();},'#2a0a5e');
  }

  if (menuState==='gameOver') {
    ctx.font='bold 28px "Segoe UI",sans-serif';
    ctx.fillStyle='#ff6b6b'; ctx.shadowColor='rgba(255,80,80,.7)'; ctx.shadowBlur=16;
    ctx.fillText('GAME OVER',W/2,py+50); ctx.shadowBlur=0;

    ctx.font='14px "Segoe UI",sans-serif';
    ctx.fillStyle='#bbb'; ctx.fillText('100 moves used',W/2,py+76);

    // Score
    ctx.font='bold 32px "Segoe UI",sans-serif'; ctx.fillStyle='#fff';
    ctx.fillText(score.toLocaleString(),W/2,py+124);
    ctx.font='13px "Segoe UI",sans-serif'; ctx.fillStyle='#999';
    ctx.fillText('FINAL SCORE',W/2,py+144);

    // New record badge
    if (newRecord) {
      ctx.font='bold 13px "Segoe UI",sans-serif'; ctx.fillStyle='#ffd966';
      ctx.shadowColor='rgba(255,210,0,.6)'; ctx.shadowBlur=10;
      ctx.fillText('NEW BEST SCORE!',W/2,py+168); ctx.shadowBlur=0;
    }

    // Stats row
    const statsY=newRecord?py+192:py+172;
    const p=profiles[currentProfileName]||{highScore:0,highCombo:0};
    ctx.font='13px "Segoe UI",sans-serif';
    ctx.fillStyle='#ffd966'; ctx.fillText('Best Score: '+(p.highScore||0).toLocaleString(),W/2,statsY);
    ctx.fillStyle='#ff9ff3'; ctx.fillText('Best Combo: '+(p.highCombo>0?'x'+p.highCombo:'-'),W/2,statsY+22);

    menuBtn('PLAY AGAIN',px+80,py+232,240,44,startGame,'#7c3aed');
    menuBtn('MAIN MENU',px+80,py+288,240,36,()=>{ menuState='main'; },'#2a0a5e');
  }

  ctx.restore();
}

// ── Input ─────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const m=cmouse(e);
  if (handleMenuClick(m)) return;
  if (menuState!==null) return;
  if (phase!=='idle') return;
  const cell=p2c(m.x,m.y); if (!cell) return;
  const t=grid[cell.row][cell.col]; if (!t) return;
  drag.active=true; drag.fromRow=cell.row; drag.fromCol=cell.col;
  drag.tile=t; drag.neighbor=null;
  drag.startMX=m.x; drag.startMY=m.y; drag.dirLocked=false; drag.dx=drag.dy=0;
  t.state='selected'; t.scale=DRAG_SCALE; canvas.classList.add('grabbing');
  initAudio();
});

canvas.addEventListener('mousemove', e => {
  const m=cmouse(e);
  const overBtn=menuButtons.some(b=>m.x>=b.x&&m.x<=b.x+b.w&&m.y>=b.y&&m.y<=b.y+b.h);
  canvas.style.cursor=overBtn?'pointer':(menuState!==null?'default':drag.active?'grabbing':'grab');
  if (!drag.active) return;
  const dx=m.x-drag.startMX, dy=m.y-drag.startMY;

  // Lock direction once threshold is crossed
  if (!drag.dirLocked && (Math.abs(dx)>DRAG_THRESH||Math.abs(dy)>DRAG_THRESH)) {
    drag.dirLocked=true;
    if (Math.abs(dx)>=Math.abs(dy)) { drag.dx=Math.sign(dx); drag.dy=0; }
    else { drag.dx=0; drag.dy=Math.sign(dy); }
    // Identify neighbor once direction is known
    const tr=drag.fromRow+drag.dy, tc=drag.fromCol+drag.dx;
    drag.neighbor=(tr>=0&&tr<ROWS&&tc>=0&&tc<COLS) ? grid[tr][tc] : null;
  }

  if (drag.dirLocked) {
    const base=c2p(drag.fromRow,drag.fromCol);
    const raw=drag.dx ? dx*drag.dx : dy*drag.dy;           // signed delta along locked axis
    const progress=clamp(raw/CELL, 0, 1);                  // 0 = at origin, 1 = at neighbor
    // Drag tile follows mouse, neighbor slides opposite
    drag.tile.x=base.x+drag.dx*progress*CELL;
    drag.tile.y=base.y+drag.dy*progress*CELL;
    if (drag.neighbor) {
      const nb=c2p(drag.fromRow+drag.dy, drag.fromCol+drag.dx);
      drag.neighbor.x=nb.x-drag.dx*progress*CELL;
      drag.neighbor.y=nb.y-drag.dy*progress*CELL;
    }
  }
});

window.addEventListener('mouseup', e => {
  if (!drag.active) return;
  drag.active=false; canvas.classList.remove('grabbing');
  const t=drag.tile; t.state='idle'; t.scale=1;

  const tr=drag.dirLocked ? drag.fromRow+drag.dy : -1;
  const tc=drag.dirLocked ? drag.fromCol+drag.dx : -1;
  const validSwap=drag.dirLocked && tr>=0 && tr<ROWS && tc>=0 && tc<COLS && grid[tr][tc];

  if (!validSwap) {
    // Animate drag tile (and any displaced neighbor) back to their grid positions
    const base=c2p(drag.fromRow,drag.fromCol);
    t.state='swapping'; t.animT=0; t.animData={sx:t.x,sy:t.y,tx:base.x,ty:base.y,dur:SWAP_DUR*0.6};
    if (drag.neighbor) {
      const nb=c2p(drag.fromRow+drag.dy,drag.fromCol+drag.dx);
      drag.neighbor.state='swapping'; drag.neighbor.animT=0;
      drag.neighbor.animData={sx:drag.neighbor.x,sy:drag.neighbor.y,tx:nb.x,ty:nb.y,dur:SWAP_DUR*0.6};
    }
    phase='animating'; animPhase='swap';
    pendingSwap={r1:drag.fromRow,c1:drag.fromCol,r2:tr,c2:tc,back:true};
    drag.neighbor=null;
    return;
  }

  // Valid swap — both tiles are already at their dragged positions; animation continues from there
  drag.neighbor=null;
  initiateSwap(drag.fromRow,drag.fromCol,tr,tc);
});

// ── Game loop ─────────────────────────────────────────────────────
let lastTime=0;
function loop(now) {
  const dt=Math.min(now-lastTime,60)/1000; lastTime=now;
  update(dt,now); render(now); requestAnimationFrame(loop);
}
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key==='Enter') createProfile(e.target.value);
});
window.addEventListener('resize', () => {
  if (menuState==='newProfile') showNameInput();
});

loadProfiles();
if (!localStorage.getItem('candyScoresV2')) {
  Object.keys(profiles).forEach(n=>{profiles[n].highScore=0;profiles[n].highCombo=0;});
  saveProfiles(); localStorage.setItem('candyScoresV2','1');
}
if (!currentProfileName || !profiles[currentProfileName]) {
  menuState='newProfile'; setTimeout(showNameInput, 50);
} else {
  menuState='main';
}
requestAnimationFrame(t=>{lastTime=t; requestAnimationFrame(loop);});
</script>
